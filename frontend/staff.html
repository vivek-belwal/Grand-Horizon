<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff — Grand Horizon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">✦</div>
      <div><div class="brand-name">Grand Horizon</div><div class="brand-sub">Management Suite</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"    class="nav-item"><span class="nav-icon">⬛</span> Dashboard</a>
      <a href="rooms.html"    class="nav-item"><span class="nav-icon">🚪</span> Rooms</a>
      <a href="guests.html"   class="nav-item"><span class="nav-icon">👤</span> Guests</a>
      <a href="bookings.html" class="nav-item"><span class="nav-icon">📋</span> Bookings</a>
      <a href="staff.html"    class="nav-item active"><span class="nav-icon">👥</span> Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="server-status"><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
        <div><h1 class="page-title">Staff</h1><p class="page-subtitle">Manage hotel staff & roles</p></div>
      </div>
      <div class="topbar-right"><div class="admin-badge">Admin Panel</div></div>
    </header>

    <div class="page-body">
      <div class="page-actions">
        <div class="search-bar">
          <input type="text" id="staffSearch" placeholder="Search by name, role, email..." oninput="searchStaff()"/>
        </div>
        <button class="btn btn-gold" onclick="openAddStaffModal()">+ Add Staff</button>
      </div>

      <div class="full-table-card">
        <div class="table-card-header">
          <h2 class="table-card-title">All Staff Members</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th><th>Name</th><th>Role</th><th>Email</th>
                <th>Phone</th><th>Salary</th><th>Join Date</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="staffTableBody">
              <tr><td colspan="8" class="loading-cell">Loading staff...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- STAFF MODAL -->
  <div class="modal-overlay" id="staffModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="staffModalTitle">Add Staff Member</h3>
        <button class="modal-close" onclick="closeModal('staffModal')">✕</button>
      </div>
      <form id="staffForm">
        <input type="hidden" id="staffId"/>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full">
              <label class="form-label">Full Name *</label>
              <input class="form-control" id="staffName" placeholder="Full name" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Role *</label>
              <select class="form-control" id="staffRole" required>
                <option value="">Select Role</option>
                <option>Manager</option><option>Receptionist</option>
                <option>Housekeeping</option><option>Security</option>
                <option>Chef</option><option>Maintenance</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-control" id="staffStatus">
                <option>Active</option><option>Inactive</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Email *</label>
              <input class="form-control" id="staffEmail" type="email" placeholder="staff@hotel.com" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Phone *</label>
              <input class="form-control" id="staffPhone" placeholder="10-digit mobile" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Salary (₹) *</label>
              <input class="form-control" id="staffSalary" type="number" placeholder="e.g. 30000" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Join Date *</label>
              <input class="form-control" id="staffJoinDate" type="date" required/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('staffModal')">Cancel</button>
          <button type="submit" class="btn btn-gold">Save Staff</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>window.addEventListener('DOMContentLoaded', initStaffPage);</script>
</body>
</html>
