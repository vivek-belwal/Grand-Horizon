<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookings — Grand Horizon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">✦</div>
      <div><div class="brand-name">Grand Horizon</div><div class="brand-sub">Management Suite</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"    class="nav-item"><span class="nav-icon">⬛</span> Dashboard</a>
      <a href="rooms.html"    class="nav-item"><span class="nav-icon">🚪</span> Rooms</a>
      <a href="guests.html"   class="nav-item"><span class="nav-icon">👤</span> Guests</a>
      <a href="bookings.html" class="nav-item active"><span class="nav-icon">📋</span> Bookings</a>
      <a href="staff.html"    class="nav-item"><span class="nav-icon">👥</span> Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="server-status"><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</button>
        <div><h1 class="page-title">Bookings</h1><p class="page-subtitle">Manage reservations & check-ins</p></div>
      </div>
      <div class="topbar-right"><div class="admin-badge">Admin Panel</div></div>
    </header>

    <div class="page-body">
      <div class="page-actions">
        <div class="search-bar">
          <input type="text" id="bookingSearch" placeholder="Search by guest, room, ID..." oninput="searchBookings()"/>
          <select class="filter-select" id="bookingFilter" onchange="filterBookings()">
            <option value="All">All Status</option>
            <option>Confirmed</option><option>Checked-In</option>
            <option>Checked-Out</option><option>Cancelled</option>
          </select>
        </div>
        <button class="btn btn-gold" onclick="openAddBookingModal()">+ New Booking</button>
      </div>

      <div class="full-table-card">
        <div class="table-card-header">
          <h2 class="table-card-title">All Bookings</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th><th>Guest</th><th>Room</th><th>Check-In</th>
                <th>Check-Out</th><th>Nights</th><th>Booking</th><th>Payment</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingsTableBody">
              <tr><td colspan="9" class="loading-cell">Loading bookings...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="bookingModalTitle">New Booking</h3>
        <button class="modal-close" onclick="closeModal('bookingModal')">✕</button>
      </div>
      <form id="bookingForm">
        <input type="hidden" id="bookingId"/>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group full">
              <label class="form-label">Guest *</label>
              <select class="form-control" id="bookingGuestId" required>
                <option value="">— Select Guest —</option>
              </select>
            </div>
            <div class="form-group full">
              <label class="form-label">Room *</label>
              <select class="form-control" id="bookingRoomId" required>
                <option value="">— Select Room —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Check-In Date *</label>
              <input class="form-control" id="bookingCheckIn" type="date" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Check-Out Date *</label>
              <input class="form-control" id="bookingCheckOut" type="date" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Booking Status</label>
              <select class="form-control" id="bookingStatus">
                <option>Confirmed</option><option>Checked-In</option>
                <option>Checked-Out</option><option>Cancelled</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Payment Status</label>
              <select class="form-control" id="bookingPayStatus">
                <option>Pending</option><option>Paid</option><option>Refunded</option>
              </select>
            </div>
            <div class="form-group full">
              <label class="form-label">Special Request</label>
              <input class="form-control" id="bookingRequest" placeholder="e.g. Early check-in, extra towels..."/>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('bookingModal')">Cancel</button>
          <button type="submit" class="btn btn-gold">Save Booking</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>window.addEventListener('DOMContentLoaded', initBookingsPage);</script>
</body>
</html>
